name: Content Validator

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  checks: write
  contents: read
  pull-requests: write

jobs:
  validate-content:
    runs-on: ubuntu-latest
    env:
      # Non-secret settings live in `.omni-content-validator.yml` (auto-loaded).
      # Only the API key comes from a GitHub Actions secret.
      OMNI_API_KEY: ${{ secrets.OMNI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check validator config
        run: |
          if [ ! -f .omni-content-validator.yml ]; then
            echo "Missing .omni-content-validator.yml in the repo root."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install content validator
        run: python -m pip install git+https://github.com/ernestoongaro/omnicles.git

      - name: Find previous history artifact
        id: history
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflowFile = 'content-validator.yml';
            const defaultBranch = context.payload.repository.default_branch;

            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: workflowFile,
              branch: defaultBranch,
              status: 'success',
              per_page: 5,
            });

            for (const run of runs.data.workflow_runs) {
              const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
                owner,
                repo,
                run_id: run.id,
              });

              const match = artifacts.data.artifacts.find(
                (artifact) => artifact.name === 'content-validator-history' && !artifact.expired,
              );

              if (match) {
                core.setOutput('run_id', run.id.toString());
                return;
              }
            }

            core.setOutput('run_id', '');

      - name: Download history artifact
        if: steps.history.outputs.run_id != ''
        uses: actions/download-artifact@v8
        with:
          name: content-validator-history
          run-id: ${{ steps.history.outputs.run_id }}
          path: .omni-content-validator
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run content validator
        id: validator
        run: |
          omni-content-validator \
            --history-in .omni-content-validator/history.json \
            --history-out .omni-content-validator/history.json \
            --report-out .omni-content-validator/report.json

      - name: Upload history artifact
        uses: actions/upload-artifact@v7
        with:
          name: content-validator-history
          path: .omni-content-validator/history.json
          if-no-files-found: ignore

      - name: Report check and PR comment
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.payload.pull_request ? context.payload.pull_request.head.sha : context.sha;

            let report = null;
            let reportMissing = false;
            try {
              report = JSON.parse(fs.readFileSync('.omni-content-validator/report.json', 'utf8'));
            } catch (error) {
              reportMissing = true;
              report = {
                total_issues: 0,
                new_issues: 0,
                existing_issues: 0,
                resolved_issues: 0,
                include_personal_folders: false,
                new_issue_samples: [],
                existing_issue_samples: [],
                resolved_issue_samples: [],
              };
            }

            const conclusion = reportMissing || report.total_issues > 0 ? 'failure' : 'success';
            const baseUrl = report.base_url
              ? (report.base_url.endsWith('/') ? report.base_url.slice(0, -1) : report.base_url)
              : null;
            const modelUrl = baseUrl && report.model_id
              ? `${baseUrl}/models/${report.model_id}/ide`
              : null;
            const summary = [
              `Total issues: ${report.total_issues}`,
              `New issues: ${report.new_issues}`,
              `Existing issues: ${report.existing_issues}`,
              `Resolved issues: ${report.resolved_issues}`,
              report.include_personal_folders ? 'Scope: includes personal folders' : null,
              modelUrl ? `Model: ${modelUrl}` : null,
              reportMissing ? 'Report missing: validator did not produce output.' : null,
            ].filter(Boolean).join('\n');

            const escapeMarkdownLinkText = (value) => String(value)
              .replace(/\\/g, '\\\\')
              .replace(/\[/g, '\\[')
              .replace(/\]/g, '\\]');

            const formatList = (items) => {
              if (!items || items.length === 0) return '_None_';
              return items.map((item) => {
                const raw = item.raw || {};
                const docName = raw.document_name || raw.name || 'Unknown document';
                const queryName = raw.query_name || null;
                const issueType = raw.issue_type || null;
                const documentUrl = typeof raw.document_url === 'string'
                  ? raw.document_url
                  : (typeof raw.url === 'string' ? raw.url : null);
                const docLabel = documentUrl
                  ? `[${escapeMarkdownLinkText(docName)}](${documentUrl})`
                  : docName;
                const headerParts = [docLabel];
                if (queryName) {
                  headerParts.push(queryName);
                } else if (issueType) {
                  headerParts.push(issueType);
                }
                const header = headerParts.join(' / ');
                const message = raw.message || item.summary || 'No details';
                return `- ${header}\n\n\`\`\`\n${message}\n\`\`\``;
              }).join('\n');
            };

            const checkOutput = {
              title: reportMissing ? 'Validator did not produce output' : `${report.total_issues} issue(s), ${report.new_issues} new`,
              summary,
              text: [
                '### Content Validator',
                '',
                '**New issues**',
                formatList(report.new_issue_samples),
                '',
                '**Existing issues**',
                formatList(report.existing_issue_samples),
                '',
                '**Resolved issues**',
                formatList(report.resolved_issue_samples),
              ].join('\n'),
            };

            await github.rest.checks.create({
              owner,
              repo,
              name: 'Content Validator',
              head_sha: sha,
              status: 'completed',
              conclusion,
              output: checkOutput,
            });

            if (!context.payload.pull_request) {
              return;
            }

            const marker = '<!-- omni-content-validator -->';
            const body = [
              marker,
              '## Content Validator',
              '',
              summary,
              '',
              '**New issues**',
              formatList(report.new_issue_samples),
              '',
              '**Existing issues**',
              formatList(report.existing_issue_samples),
              '',
              '**Resolved issues**',
              formatList(report.resolved_issue_samples),
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
