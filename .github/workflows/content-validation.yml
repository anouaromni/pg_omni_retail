name: Content Validation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      OMNI_BASE_URL: https://anouar.playground.exploreomni.dev
      OMNI_MODEL_ID: 01d9bcd6-ebbd-48be-b0be-d39e9fc2f537
      OMNI_API_KEY: ${{ secrets.OMNI_API_KEY }}
      # Empty on non-PR runs -> validates the base model instead of a branch.
      OMNI_BRANCH_NAME: ${{ github.head_ref }}
    steps:
      - name: Run Omni content validation
        id: validate
        shell: bash
        run: |
          python3 - <<'PY'
          import json, os, sys, urllib.parse, urllib.request

          base = os.environ["OMNI_BASE_URL"].rstrip("/")
          model_id = os.environ["OMNI_MODEL_ID"]
          api_key = os.environ["OMNI_API_KEY"]
          branch_name = os.environ.get("OMNI_BRANCH_NAME") or ""
          headers = {"Authorization": f"Bearer {api_key}"}

          def get(url, params=None):
              if params:
                  url = f"{url}?{urllib.parse.urlencode(params)}"
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=60) as r:
                  return json.loads(r.read().decode("utf-8"))

          # 1. Resolve the Omni branch whose name matches the git branch.
          branch_id = None
          if branch_name:
              cursor = None
              while True:
                  params = {"cursor": cursor} if cursor else None
                  payload = get(f"{base}/api/v1/models", params)
                  for rec in payload.get("records", []):
                      if (rec.get("modelKind") == "BRANCH"
                              and rec.get("baseModelId") == model_id
                              and rec.get("name") == branch_name):
                          branch_id = rec.get("id")
                          break
                  cursor = payload.get("pageInfo", {}).get("nextCursor")
                  if branch_id or not cursor:
                      break
              if branch_id:
                  print(f"Resolved branch '{branch_name}' -> {branch_id}")
              else:
                  print(f"No Omni branch named '{branch_name}'; validating base model")

          # 2. Run the content validator.
          params = {}
          if branch_id:
              params["branch_id"] = branch_id
          payload = get(f"{base}/api/v1/models/{model_id}/content-validator", params or None)

          # 3. Collect issues from the payload.
          issues = []
          for doc in payload.get("content", []) if isinstance(payload, dict) else []:
              if not isinstance(doc, dict):
                  continue
              name = doc.get("name") or doc.get("identifier") or "Unknown document"
              url = doc.get("url") if isinstance(doc.get("url"), str) else None
              def add(kind, detail, msg):
                  issues.append({"document": name, "url": url,
                                 "kind": kind, "detail": detail, "message": msg})
              for item in doc.get("dashboard_filter_issues", []) or []:
                  msg = item.get("message") if isinstance(item, dict) else item
                  add("dashboard_filter", None, msg)
              for q in doc.get("queries_and_issues", []) or []:
                  if not isinstance(q, dict):
                      continue
                  for item in q.get("issues", []) or []:
                      msg = item.get("message") if isinstance(item, dict) else item
                      add("query", q.get("query_name"), msg)

          # 4. Write a report for the PR-comment step.
          model_url = f"{base}/models/{model_id}/ide"
          with open("validation-report.json", "w") as f:
              json.dump({"total": len(issues), "issues": issues,
                         "branch_name": branch_name, "branch_id": branch_id,
                         "model_url": model_url}, f)

          # 5. Job summary + console output.
          lines = [f"## Content Validation", "",
                   f"- Branch: `{branch_name or 'base model'}`",
                   f"- Issues found: **{len(issues)}**", ""]
          if issues:
              lines.append("| Document | Type | Query | Message |")
              lines.append("|---|---|---|---|")
              for i in issues:
                  doc = f"[{i['document']}]({i['url']})" if i["url"] else i["document"]
                  msg = (i["message"] or "").replace("\n", " ").replace("|", "\\|")
                  lines.append(f"| {doc} | {i['kind']} | {i['detail'] or ''} | {msg} |")
          else:
              lines.append("No content issues found. ✅")
          summary = "\n".join(lines)
          print(summary)
          step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary:
              with open(step_summary, "a") as f:
                  f.write(summary + "\n")

          # 6. Fail the check if any issue was found.
          sys.exit(1 if issues else 0)
          PY

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- omni-content-validation -->';
            let report;
            try {
              report = JSON.parse(fs.readFileSync('validation-report.json', 'utf8'));
            } catch (e) {
              report = null;
            }

            let body;
            if (!report) {
              body = [marker, '## Content Validation', '',
                '⚠️ The validator did not produce a report (it errored before finishing). Check the job logs.'].join('\n');
            } else {
              const header = report.total > 0
                ? `❌ **${report.total}** content issue(s) found on \`${report.branch_name || 'base model'}\`.`
                : `✅ No content issues found on \`${report.branch_name || 'base model'}\`.`;
              const rows = report.issues.map((i) => {
                const doc = i.url ? `[${i.document}](${i.url})` : i.document;
                const msg = (i.message || '').replace(/\n/g, ' ').replace(/\|/g, '\\|');
                return `| ${doc} | ${i.kind} | ${i.detail || ''} | ${msg} |`;
              });
              const table = report.total > 0
                ? ['', '| Document | Type | Query | Message |', '|---|---|---|---|', ...rows].join('\n')
                : '';
              body = [marker, '## Content Validation', '', header,
                `\n[Open model IDE](${report.model_url})`, table].join('\n');
            }

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
