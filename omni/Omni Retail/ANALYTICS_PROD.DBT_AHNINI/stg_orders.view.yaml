# Reference this view as analytics_prod_dbt_ahnini__stg_orders
#This description was pulled from dbt.
description: Order data with basic cleaning and transformation applied, one row per order.

catalog: ANALYTICS_PROD
schema: DBT_AHNINI
table_name: STG_ORDERS

dimensions:
  order_id:
    sql: '"ORDER_ID"'
    format: ID
    #This description was pulled from dbt.
    description: The unique key for each order.

  location_id:
    sql: '"LOCATION_ID"'
    format: ID

  customer_id:
    sql: '"CUSTOMER_ID"'
    format: ID

  subtotal_cents:
    sql: '"SUBTOTAL_CENTS"'

  tax_paid_cents:
    sql: '"TAX_PAID_CENTS"'

  order_total_cents:
    sql: '"ORDER_TOTAL_CENTS"'

  subtotal:
    sql: '"SUBTOTAL"'

  tax_paid:
    sql: '"TAX_PAID"'

  order_total:
    sql: '"ORDER_TOTAL"'

  order_date:
    sql: '"ORDER_DATE"'

measures:
  count:
    aggregate_type: count

#The info below was pulled from your dbt repository and is read-only.
dbt:
  name: stg_orders
  target_schema: dbt_ahnini
  description: Order data with basic cleaning and transformation applied, one row per order.
  config:
    materialized: view
  code: |-
    with

    source as (

        -- {# This references seed (CSV) data - try switching to {{ source('ecom', 'raw_orders') }} #}
        select * from {{ ref('raw_orders') }}

    ),

    renamed as (

        select

            ----------  ids
            id as order_id,
            store_id as location_id,
            customer as customer_id,

            ---------- numerics
            subtotal as subtotal_cents,
            tax_paid as tax_paid_cents,
            order_total as order_total_cents,
            {{ cents_to_dollars('subtotal') }} as subtotal,
            {{ cents_to_dollars('tax_paid') }} as tax_paid,
            {{ cents_to_dollars('order_total') }} as order_total,

            ---------- timestamps
            cast(ordered_at as date) as order_date

        from source

    )

    select * from renamed
  referenced_by: [ order_items, orders ]
