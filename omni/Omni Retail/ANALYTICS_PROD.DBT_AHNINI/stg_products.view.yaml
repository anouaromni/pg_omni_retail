# Reference this view as analytics_prod_dbt_ahnini__stg_products
#This description was pulled from dbt.
description: Product (food and drink items that can be ordered) data with basic
  cleaning and transformation applied, one row per product.

catalog: ANALYTICS_PROD
schema: DBT_AHNINI
table_name: STG_PRODUCTS

dimensions:
  product_id:
    sql: '"PRODUCT_ID"'
    format: ID
    #This description was pulled from dbt.
    description: The unique key for each product.

  product_name:
    sql: '"PRODUCT_NAME"'

  product_type:
    sql: '"PRODUCT_TYPE"'

  product_description:
    sql: '"PRODUCT_DESCRIPTION"'

  product_price:
    sql: '"PRODUCT_PRICE"'

  is_food_item:
    sql: '"IS_FOOD_ITEM"'

  is_drink_item:
    sql: '"IS_DRINK_ITEM"'

measures:
  count:
    aggregate_type: count

#The info below was pulled from your dbt repository and is read-only.
dbt:
  name: stg_products
  target_schema: dbt_ahnini
  description: Product (food and drink items that can be ordered) data with basic
    cleaning and transformation applied, one row per product.
  config:
    materialized: view
  code: |-
    with

    source as (

        -- {# This references seed (CSV) data - try switching to {{ source('ecom', 'raw_products') }} #}
        select * from {{ ref('raw_products') }}

    ),

    renamed as (

        select

            ----------  ids
            sku as product_id,

            ---------- text
            name as product_name,
            type as product_type,
            description as product_description,


            ---------- numerics
            {{ cents_to_dollars('price') }} as product_price,

            ---------- booleans
            coalesce(type = 'jaffle', false) as is_food_item,

            coalesce(type = 'beverage', false) as is_drink_item

        from source

    )

    select * from renamed
  referenced_by: [ order_items, products ]
