# Reference this view as analytics_prod_ecomm__order_items
catalog: ANALYTICS_PROD
schema: ECOMM
table_name: ORDER_ITEMS

dimensions:
  id:
    sql: '"ID"'
    format: ID
    primary_key: true

  order_id:
    sql: '"ORDER_ID"'
    format: ID

  user_id:
    sql: '"USER_ID"'
    format: ID

  inventory_item_id:
    sql: '"INVENTORY_ITEM_ID"'
    format: ID

  sale_price:
    sql: '"SALE_PRICE"'

  status:
    sql: '"STATUS"'

  created_at:
    sql: '"CREATED_AT"'

  returned_at:
    sql: '"RETURNED_AT"'

  shipped_at:
    sql: '"SHIPPED_AT"'

  delivered_at:
    sql: '"DELIVERED_AT"'

  is_returned:
    sql: '"IS_RETURNED"'

  is_delivered:
    sql: '"IS_DELIVERED"'

  is_shipped:
    sql: '"IS_SHIPPED"'

  margin:
    sql: '"MARGIN"'

  months_since_signup:
    sql: '"MONTHS_SINCE_SIGNUP"'

  time_to_ship:
    sql: '"TIME_TO_SHIP"'

measures:
  count:
    aggregate_type: count

  total_sale_price:
    sql: ${sale_price}
    label: Total Sale Price
    format: currency_2
    description: Total revenue actually paid across line items (sum of sale price).
      This is realized revenue, not list price.
    aggregate_type: sum
    synonyms: [ revenue, sales, total revenue, gmv ]

  order_count:
    sql: ${order_id}
    label: Order Count
    format: number_0
    description: Number of distinct orders. Use this for order counts — the `count`
      measure counts line items, not orders.
    aggregate_type: count_distinct
    synonyms: [ orders, number of orders, distinct orders ]

  total_margin:
    sql: ${margin}
    label: Total Margin
    format: currency_2
    description: Total profit across line items (sum of per-line-item margin = sale
      price minus cost).
    aggregate_type: sum
    synonyms: [ profit, gross profit, margin dollars ]
