# Reference this view as analytics_prod_ecomm__order_items
catalog: ANALYTICS_PROD
schema: ECOMM
table_name: ORDER_ITEMS

dimensions:
  id:
    sql: '"ID"'
    format: ID
    primary_key: true

  order_id:
    sql: '"ORDER_ID"'
    format: ID

  user_id:
    sql: '"USER_ID"'
    format: ID

  inventory_item_id:
    sql: '"INVENTORY_ITEM_ID"'
    format: ID

  sale_price:
    sql: '"SALE_PRICE"'

  status:
    sql: '"STATUS"'

  created_at:
    sql: '"CREATED_AT"'
    timeframes: [ raw, date, week, month, quarter, year, week_of_year ]

  returned_at:
    sql: '"RETURNED_AT"'

  shipped_at:
    sql: '"SHIPPED_AT"'

  delivered_at:
    sql: '"DELIVERED_AT"'

  is_returned:
    sql: '"IS_RETURNED"'

  is_delivered:
    sql: '"IS_DELIVERED"'

  is_shipped:
    sql: '"IS_SHIPPED"'

  margin:
    sql: '"MARGIN"'

  months_since_signup:
    sql: '"MONTHS_SINCE_SIGNUP"'

  time_to_ship:
    sql: '"TIME_TO_SHIP"'

  order_year:
    sql: CAST(EXTRACT(YEAR FROM ${created_at}) AS VARCHAR)
    label: Order Year
    description: Calendar year the order line item was created. Provides dropdown
      suggestions for filtering.
    group_label: Order Date Parts
    synonyms: [ year ]
    faceting:
      depends_on: []

  order_month:
    sql: CASE EXTRACT(MONTH FROM ${created_at}) WHEN 1 THEN 'January' WHEN 2 THEN
      'February' WHEN 3 THEN 'March' WHEN 4 THEN 'April' WHEN 5 THEN 'May' WHEN
      6 THEN 'June' WHEN 7 THEN 'July' WHEN 8 THEN 'August' WHEN 9 THEN
      'September' WHEN 10 THEN 'October' WHEN 11 THEN 'November' WHEN 12 THEN
      'December' END
    label: Order Month
    description: Month name (January-December) the order line item was created.
      Suggestions are filtered by the selected Order Year, sorted in calendar
      order.
    group_label: Order Date Parts
    order_by_field: order_month_num
    synonyms: [ month ]
    faceting:
      depends_on: [ order_year ]

  order_week_of_year:
    sql: LPAD(CAST(EXTRACT(WEEK FROM ${created_at}) AS VARCHAR), 2, '0')
    label: Order Week Number
    description: Week number of the year (1-53) the order line item was created.
      Suggestions are filtered by the selected Order Year and Order Month.
    group_label: Order Date Parts
    synonyms: [ week number, week of year, week num ]
    faceting:
      depends_on: [ order_year, order_month ]

  order_month_num:
    sql: EXTRACT(MONTH FROM ${created_at})
    label: Order Month Number
    description: Numeric month (1-12) used to sort Order Month in calendar order.
    group_label: Order Date Parts
    hidden: true

measures:
  count:
    aggregate_type: count

  total_sale_price:
    sql: ${sale_price}
    label: Total Sale Price
    format: currency_2
    description: Total revenue actually paid across line items (sum of sale price).
      This is realized revenue, not list price.
    aggregate_type: sum
    synonyms: [ revenue, sales, total revenue, gmv ]

  order_count:
    sql: ${order_id}
    label: Order Count
    format: number_0
    description: Number of distinct orders. Use this for order counts — the `count`
      measure counts line items, not orders.
    aggregate_type: count_distinct
    synonyms: [ orders, number of orders, distinct orders ]

  total_margin:
    sql: ${margin}
    label: Total Margin
    format: currency_2
    description: Total profit across line items (sum of per-line-item margin = sale
      price minus cost).
    aggregate_type: sum
    synonyms: [ profit, gross profit, margin dollars ]
