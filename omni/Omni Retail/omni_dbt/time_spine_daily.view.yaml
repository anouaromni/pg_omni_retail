# Reference this view as omni_dbt__time_spine_daily
schema_label: ""
#This description was pulled from dbt.
description: Daily time spine for MetricFlow joins and cumulative calculations.

schema: omni_dbt
table_name: TIME_SPINE_DAILY

dimensions:
  date_day:
    sql: '"DATE_DAY"'

measures:
  count:
    aggregate_type: count

#The info below was pulled from your dbt repository and is read-only.
dbt:
  name: time_spine_daily
  target_schema: DBT_AHNINI
  description: Daily time spine for MetricFlow joins and cumulative calculations.
  config:
    materialized: table
  code: |-
    {{ config(materialized='table') }}

    with days as (

        {{
            dbt.date_spine(
                'day',
                "to_date('2000-01-01')",
                "to_date('2035-01-01')"
            )
        }}

    ),

    final as (

        select cast(date_day as date) as date_day
        from days

    )

    select * from final
