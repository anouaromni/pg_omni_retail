# Reference this view as omni_dbt__products_ltv
schema_label: ""
#This description was pulled from dbt.
description: |
  Product lifetime value mart with one row per product. This model summarizes all historical order items to show each product's lifetime gross revenue, lifetime gross profit, and total supply cost, making it the primary mart for analyzing product-level LTV and long-run product profitability.

schema: omni_dbt
table_name: PRODUCTS_LTV

dimensions:
  product_id:
    sql: '"PRODUCT_ID"'
    format: ID
    #This description was pulled from dbt.
    description: The unique key for the product.

  gross_revenue:
    sql: '"GROSS_REVENUE"'
    #This description was pulled from dbt.
    description: The total lifetime revenue generated by the product across all order items.

  gross_profit:
    sql: '"GROSS_PROFIT"'
    #This description was pulled from dbt.
    description: The product's lifetime gross profit, calculated as gross revenue
      minus total supply cost.

  supply_cost_total:
    sql: '"SUPPLY_COST_TOTAL"'
    #This description was pulled from dbt.
    description: The total lifetime supply cost allocated to the product across all
      order items.

measures:
  count:
    aggregate_type: count

#The info below was pulled from your dbt repository and is read-only.
dbt:
  name: products_ltv
  target_schema: DBT_AHNINI
  description: |
    Product lifetime value mart with one row per product. This model summarizes all historical order items to show each product's lifetime gross revenue, lifetime gross profit, and total supply cost, making it the primary mart for analyzing product-level LTV and long-run product profitability.
  config:
    materialized: table
  code: |-
    select
        products.product_id,
        coalesce(sum(order_items.product_price), 0) as gross_revenue,
        coalesce(sum(order_items.product_price), 0) - coalesce(sum(order_items.supply_cost), 0) as gross_profit,
        coalesce(sum(order_items.supply_cost), 0) as supply_cost_total
    from {{ ref('order_items') }} as order_items
    left join {{ ref('products') }} as products
        on order_items.product_id = products.product_id
    group by 1
