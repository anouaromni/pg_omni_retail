base_view: analytics_prod_ecomm__order_items

joins:
  analytics_prod_ecomm__users: {}
  analytics_prod_ecomm__inventory_items:
    analytics_prod_ecomm__products: {}

views:
  analytics_prod_ecomm__order_items:
    dimensions:
      discount_amount:
        sql: ${analytics_prod_ecomm__products.retail_price} -
          ${analytics_prod_ecomm__order_items.sale_price}
        label: Discount Amount
        format: currency_2
        description: Difference between the product's list price and the actual sale
          price for this line item.

    measures:
      total_list_price:
        sql: ${analytics_prod_ecomm__products.retail_price}
        label: Total List Price
        format: currency_2
        description: Total product list (retail) price across line items, before discount.
        aggregate_type: sum

      total_discount:
        sql: ${analytics_prod_ecomm__products.retail_price} -
          ${analytics_prod_ecomm__order_items.sale_price}
        label: Total Discount
        format: currency_2
        description: Total discount given (list price minus sale price) across line items.
        aggregate_type: sum

      discount_rate:
        sql: ${total_discount} / NULLIF(${total_list_price}, 0)
        label: Discount Rate
        format: percent_2
        description: Total discount as a share of total list price.

ai_context: |-
  Omni Retail order line items — one row per item within an order.

  Grain is per line item: use `count` for items sold and `order_count` for distinct orders. For "revenue", prefer `valid_revenue` (excludes cancelled).

  Joins: users (the buyer) and products (catalog, via the inventory_items bridge). inventory_items is a pass-through bridge — do not surface its fields; use products for product attributes.

  For business-specific term not inferable from this model (e.g. region codenames, internal naming/conventions), search Notion first before answering, then fall back to the modeled data.
