base_view: analytics_prod_ecomm__order_items

joins:
  analytics_prod_ecomm__users: {}
  analytics_prod_ecomm__inventory_items:
    analytics_prod_ecomm__products: {}

views:
  analytics_prod_ecomm__order_items:
    dimensions:
      discount_amount:
        sql: ${analytics_prod_ecomm__products.retail_price} -
          ${analytics_prod_ecomm__order_items.sale_price}
        label: Discount Amount
        format: currency_2
        description: Difference between the product's list price and the actual sale
          price for this line item.

    measures:
      total_list_price:
        sql: ${analytics_prod_ecomm__products.retail_price}
        label: Total List Price
        format: currency_2
        description: Total product list (retail) price across line items, before discount.
        aggregate_type: sum

      total_discount:
        sql: ${analytics_prod_ecomm__products.retail_price} -
          ${analytics_prod_ecomm__order_items.sale_price}
        label: Total Discount
        format: currency_2
        description: Total discount given (list price minus sale price) across line items.
        aggregate_type: sum

      discount_rate:
        sql: ${total_discount} / NULLIF(${total_list_price}, 0)
        label: Discount Rate
        format: percent_2
        description: Total discount as a share of total list price.

ai_context: |-
  Omni Retail's order line items — one row per item within an order.

  Base view: analytics_prod_ecomm__order_items (the line item), joined to:
    - analytics_prod_ecomm__users (the customer / buyer)
    - analytics_prod_ecomm__products (the product catalog, reached via the inventory_items bridge)

  Grain is per line item: use `count` for items sold and `order_count` (distinct orders) for order counts.

  inventory_items is a pass-through join bridge only — do not surface its fields for analysis.

  Additional business context lives in Notion. For anything business-specific that cannot be inferred from the data in this model — for example, region codenames and other internal naming, definitions, or conventions — search Notion first before answering. Treat Notion as the default starting point for resolving these business-specific terms, and only fall back to the modeled data once you've checked there.
