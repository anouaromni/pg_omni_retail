base_view: analytics_prod_ecomm__order_items

# Excludes the calendar date-part dimensions from AI context while keeping them usable as UI filters.
ai_fields:
  [
    all_views.*,
    -analytics_prod_ecomm__order_items.order_year,
    -analytics_prod_ecomm__order_items.order_month,
    -analytics_prod_ecomm__order_items.order_week_of_year
  ]

joins:
  analytics_prod_ecomm__users: {}
  analytics_prod_ecomm__inventory_items:
    analytics_prod_ecomm__products: {}

views:
  analytics_prod_ecomm__order_items:
    dimensions:
      discount_amount:
        sql: ${analytics_prod_ecomm__products.retail_price} -
          ${analytics_prod_ecomm__order_items.sale_price}
        label: Discount Amount
        format: currency_2
        description: Difference between the product's list price and the actual sale
          price for this line item.

    measures:
      total_list_price:
        sql: ${analytics_prod_ecomm__products.retail_price}
        label: Total List Price
        format: currency_2
        description: Total product list (retail) price across line items, before discount.
        aggregate_type: sum

      total_discount:
        sql: ${analytics_prod_ecomm__products.retail_price} -
          ${analytics_prod_ecomm__order_items.sale_price}
        label: Total Discount
        format: currency_2
        description: Total discount given (list price minus sale price) across line items.
        aggregate_type: sum

      discount_rate:
        sql: ${total_discount} / NULLIF(${total_list_price}, 0)
        label: Discount Rate
        format: percent_2
        description: Total discount as a share of total list price.

ai_context: |-
  Omni Retail order line items — one row per item within an order (grain = line item).

  Metrics: `count` = items sold; `order_count` = distinct orders; `total_sale_price` = realized revenue; `total_margin` = profit. Prefer these over ad-hoc sums.

  `status` values: Complete, Shipped, Processing, Returned, Cancelled. Exclude Cancelled for realized sales; treat Returned separately for net-of-returns.

  Joins: users (the buyer) and products (catalog, via the inventory_items bridge). inventory_items is a pass-through bridge — use products for product attributes.

  For business-specific terms not inferable from this model (e.g. region codenames, internal conventions), search Notion first, then fall back to the modeled data.
