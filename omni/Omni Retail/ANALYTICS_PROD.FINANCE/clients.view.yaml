# Reference this view as analytics_prod_finance__clients
catalog: ANALYTICS_PROD
schema: FINANCE
table_name: CLIENTS

dimensions:
  client_id:
    sql: '"CLIENT_ID"'
    format: ID

  client_name:
    sql: '"CLIENT_NAME"'

  client_email:
    sql: '"CLIENT_EMAIL"'

  investment_style:
    sql: '"INVESTMENT_STYLE"'

  risk_tolerance:
    sql: '"RISK_TOLERANCE"'

  account_manager:
    sql: '"ACCOUNT_MANAGER"'

  created_at:
    sql: '"CREATED_AT"'

  reference_data:
    sql: '"REFERENCE_DATA"'

  enriched_at:
    sql: '"ENRICHED_AT"'

measures:
  count:
    aggregate_type: count
