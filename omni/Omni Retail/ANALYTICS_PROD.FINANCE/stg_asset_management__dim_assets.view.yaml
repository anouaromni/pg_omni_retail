# Reference this view as analytics_prod_finance__stg_asset_management__dim_assets
catalog: ANALYTICS_PROD
schema: FINANCE
table_name: STG_ASSET_MANAGEMENT__DIM_ASSETS

dimensions:
  asset_id:
    sql: '"ASSET_ID"'
    format: ID

  asset_name:
    sql: '"ASSET_NAME"'

  asset_type:
    sql: '"ASSET_TYPE"'

  asset_class:
    sql: '"ASSET_CLASS"'

  sector:
    sql: '"SECTOR"'

  current_price:
    sql: '"CURRENT_PRICE"'

measures:
  count:
    aggregate_type: count
