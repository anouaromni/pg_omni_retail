# Reference this view as analytics_prod_finance__yearly_results
catalog: ANALYTICS_PROD
schema: FINANCE
table_name: YEARLY_RESULTS

dimensions:
  company:
    sql: '"COMPANY"'

  statement_name:
    sql: '"STATEMENT_NAME"'

  fiscal_year:
    sql: '"FISCAL_YEAR"'

  filing_date:
    sql: '"FILING_DATE"'

  period_end_date:
    sql: '"PERIOD_END_DATE"'

  line_item_name:
    sql: '"LINE_ITEM_NAME"'

  line_item_value:
    sql: '"LINE_ITEM_VALUE"'

  unit_name:
    sql: '"UNIT_NAME"'

measures:
  count:
    aggregate_type: count
