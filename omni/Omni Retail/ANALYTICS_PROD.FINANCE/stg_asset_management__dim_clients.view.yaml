schema: FINANCE
table_name: STG_ASSET_MANAGEMENT__DIM_CLIENTS

dimensions:
  client_id:
    sql: '"CLIENT_ID"'
    format: ID

  client_name:
    sql: '"CLIENT_NAME"'

  client_email:
    sql: '"CLIENT_EMAIL"'

  investment_style:
    sql: '"INVESTMENT_STYLE"'

  risk_tolerance:
    sql: '"RISK_TOLERANCE"'

  account_manager:
    sql: '"ACCOUNT_MANAGER"'

  created_at:
    sql: '"CREATED_AT"'

measures:
  count:
    aggregate_type: count
