    sql: '"TRANSACTION_ID"'
    format: ID

  client_id:
    sql: '"CLIENT_ID"'
    format: ID

  portfolio_id:
    sql: '"PORTFOLIO_ID"'
    format: ID

  asset_id:
    sql: '"ASSET_ID"'
    format: ID

  account_id:
    sql: '"ACCOUNT_ID"'
    format: ID

  transaction_type:
    sql: '"TRANSACTION_TYPE"'

  quantity:
    sql: '"QUANTITY"'

  price_per_unit:
    sql: '"PRICE_PER_UNIT"'

  total_amount:
    sql: '"TOTAL_AMOUNT"'

  fees:
    sql: '"FEES"'

  created_at:
    sql: '"CREATED_AT"'

measures:
  count:
    aggregate_type: count
