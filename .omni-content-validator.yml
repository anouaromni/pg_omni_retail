# Omni Content Validator config (non-secret settings only).
# The CLI auto-loads this file from the repo root.
# Keep secrets like the API key in GitHub Actions secrets, never here.
# Need to be parametrized for later

base_url: https://ani.omniapp.co
model_id: 09472205-1842-42c1-a57d-e27aa798066d

# Resolve the Omni branch whose name matches the PR's head branch.
branch_name: ${GITHUB_HEAD_REF}

# Behavior flags.
# fail_on_new_only: only fail the check on NEW issues vs. the history baseline,
# so pre-existing broken content does not block unrelated PRs.
fail_on_new_only: true
include_personal_folders: false
timeout: 60
